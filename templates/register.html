<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register · ClassMate</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap">
<style>
:root{--font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--shadow-sm:0 2px 8px rgba(0,0,0,0.06);--shadow-lg:0 20px 48px rgba(0,0,0,0.16);--bg-primary:#fff;--bg-secondary:#fafafa;--bg-tertiary:#f5f5f7;--text-primary:#0a0a0a;--text-secondary:rgba(0,0,0,0.65);--text-tertiary:rgba(0,0,0,0.45);--border-color:rgba(0,0,0,0.06);--border-hover:rgba(0,0,0,0.12);--accent:#ff2d55;--accent-light:rgba(255,45,85,0.08);--accent-hover:#e6002e;--success:#0fb06b;--success-bg:rgba(15,176,107,0.08);--info:#3b82f6;--info-bg:rgba(59,130,246,0.08);--font-xs:.75rem;--font-sm:.8125rem;--font-base:.9375rem;--font-lg:1.125rem;--font-xl:1.25rem;--font-2xl:1.5rem;--transition-base:250ms cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-family);background:var(--bg-primary);color:var(--text-primary);font-size:var(--font-base);line-height:1.6;-webkit-font-smoothing:antialiased}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);padding:20px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(255,45,85,0.04) 0%,transparent 70%);border-radius:50%;top:-200px;right:-150px;pointer-events:none}
.auth-page::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.04) 0%,transparent 70%);border-radius:50%;bottom:-100px;left:-150px;pointer-events:none}
.auth-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-xl);padding:44px 40px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:9999px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-neutral{background:var(--bg-tertiary);color:var(--text-secondary)}
.badge-success{background:rgba(15,176,107,0.08);color:#0fb06b}
.auth-logo{display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--accent);border-radius:var(--radius-md);margin:0 auto 24px;color:#fff;font-weight:700;font-size:1.5rem;box-shadow:0 8px 24px rgba(255,45,85,0.25)}
.auth-card h2{font-size:var(--font-2xl);font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-0.02em}
.auth-card .subtitle{text-align:center;color:var(--text-tertiary);font-size:var(--font-sm);margin-bottom:28px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:var(--font-sm);font-weight:500;color:var(--text-secondary);margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;background:var(--bg-primary);border:1.25px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);transition:border-color var(--transition-base),box-shadow var(--transition-base);font-size:var(--font-base)}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.form-input::placeholder{color:var(--text-tertiary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full-btn{width:100%;justify-content:center;padding:12px;font-weight:500}
.btn-primary{background:var(--accent);color:#fff;border:1.25px solid var(--accent);border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-weight:500;font-size:var(--font-sm);transition:all var(--transition-base);font-family:var(--font-family)}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-secondary{background:transparent;color:var(--text-primary);border:1.25px solid var(--border-hover);border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-weight:500;font-size:var(--font-sm);transition:all var(--transition-base);font-family:var(--font-family)}
.btn-secondary:hover{background:var(--bg-tertiary)}
.divider{text-align:center;color:var(--text-tertiary);font-size:var(--font-xs);margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:32%;height:1px;background:var(--border-color)}
.divider::before{left:0}.divider::after{right:0}
.auth-footer{text-align:center;font-size:var(--font-sm);color:var(--text-secondary)}
.auth-footer a{color:var(--accent);font-weight:500;cursor:pointer}
.role-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.role-option{border:1.25px solid var(--border-color);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:pointer;transition:all var(--transition-base);background:var(--bg-primary)}
.role-option:hover{border-color:var(--border-hover);background:var(--bg-secondary)}
.role-option.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.role-option i{font-size:18px;display:block;margin-bottom:4px}
.role-option .role-name{font-size:var(--font-xs);font-weight:500}
@media(max-width:480px){.form-row{grid-template-columns:1fr}.role-selector{grid-template-columns:repeat(2,1fr)}.auth-card{padding:28px 20px}}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">C</div>
    <h2>Create account</h2>
    <p class="subtitle">Join ClassMate as a new user</p>
    <form id="registerForm">
      <div class="role-selector">
        <div class="role-option" data-value="Student"><i class="fas fa-user-graduate"></i><span class="role-name">Student</span></div>
        <div class="role-option" data-value="Teacher"><i class="fas fa-chalkboard-user"></i><span class="role-name">Teacher</span></div>
        <div class="role-option" data-value="Parent"><i class="fas fa-people-roof"></i><span class="role-name">Parent</span></div>
        <div class="role-option" data-value="Admin"><i class="fas fa-shield-halved"></i><span class="role-name">Admin</span></div>
      </div>
      <input type="hidden" name="role" id="roleInput" value="">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First name</label><input type="text" class="form-input" name="first_name" required></div>
        <div class="form-group"><label class="form-label">Last name</label><input type="text" class="form-input" name="last_name" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email address</label><input type="email" class="form-input" name="email" placeholder="you@school.edu" required></div>
      <div class="form-group"><label class="form-label">Phone number</label><input type="tel" class="form-input" name="phone_number" placeholder="+254 700 000 000"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" name="password" placeholder="Min. 8 characters" required minlength="8"></div>
      <button type="submit" class="btn-primary full-btn">Create account</button>
    </form>
    <div class="divider">or</div>
    <p class="auth-footer">Already have an account? <a onclick="window.location.href='/login'">Sign in</a></p>
  </div>
</div>
<script>const API_BASE='';const AUTH_KEY='classmate_token';const $=s=>document.querySelector(s);const $$=s=>Array.from(document.querySelectorAll(s));function api(path,opts={}){const headers={'Content-Type':'application/json',...(opts.headers||{})};const t=localStorage.getItem(AUTH_KEY);if(t)headers.Authorization=`Bearer ${t}`;return fetch(`${API_BASE}${path}`,{...opts,headers}).then(r=>{if(r.status===401){localStorage.removeItem(AUTH_KEY);window.location.href='/login';return Promise.reject(new Error('Unauthorized'))}if(r.status===204)return null;return r.json().catch(()=>({}))})}
document.querySelectorAll('.role-option').forEach(opt=>{opt.addEventListener('click',()=>{document.querySelectorAll('.role-option').forEach(o=>o.classList.remove('selected'));opt.classList.add('selected');document.getElementById('roleInput').value=opt.dataset.value})});
function showToast(message,type='info'){const toast=document.createElement('div');const bg=type==='error'?'#ff2d55':type==='success'?'#0fb06b':'#0a0a0a';toast.style.cssText=`position:fixed;bottom:24px;right:24px;background:${bg};color:#fff;padding:14px 20px;border-radius:12px;font-size:0.875rem;font-weight:500;z-index:9999;box-shadow:0 20px 48px rgba(0,0,0,0.22)`;toast.textContent=message;document.body.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity 0.3s'},2800);setTimeout(()=>toast.remove(),3200)}
document.getElementById('registerForm').addEventListener('submit',async e=>{e.preventDefault();const btn=e.target.querySelector('button[type=submit]');const fd=new FormData(e.target);const role=fd.get('role');if(!role){showToast('Please select a role','error');return}btn.disabled=true;btn.textContent='Creating account...';try{const res=await api('/api/auth/register',{method:'POST',body:JSON.stringify({email:fd.get('email'),password:fd.get('password'),first_name:fd.get('first_name'),last_name:fd.get('last_name'),phone_number:fd.get('phone_number'),role})});if(res.id){localStorage.setItem('classmate_user',JSON.stringify(res));localStorage.setItem(AUTH_KEY,'');showToast('Account created successfully!','success');setTimeout(()=>window.location.href='/login',1800)}else{showToast(res.error||'Registration failed','error');btn.disabled=false;btn.textContent='Create account'}}catch(err){btn.disabled=false;btn.textContent='Create account';showToast(err.message||'Registration failed','error')}});</script>
<script>
const style=document.createElement('style');style.textContent='@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';document.head.appendChild(style);
</script>
</body>
</html>
